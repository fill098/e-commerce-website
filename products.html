<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style/style.css" />
    <title>Dress to the Gills — Shop</title>
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Dress to the Gills</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="products.html">Shop</a>
            </li>
          </ul>

          <!-- Search + Cart -->
          <div class="d-flex align-items-center gap-2">
            <input class="form-control" type="search" placeholder="Search products..." id="inp-Search" />
            <button class="btn btn-outline-success" type="button" id="btn-search">Search</button>
            <a href="cart.html" class="btn btn-outline-dark position-relative ms-2">
              🛒
              <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-dark"> 0 </span>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Clear cache -->
    <button
      onclick="
        localStorage.clear();
        location.reload();
      "
    >
      Clear Cache
    </button>

    <!-- Main content -->
    <div class="container mt-5">
      <h1 class="text-dark text-center mb-4">Dress to the Gills</h1>

      <!-- Filter buttons -->
      <div class="mb-4 d-flex flex-wrap gap-2 justify-content-center">
        <button class="btn btn-outline-secondary filter-btn active" id="btn-all">All</button>
        <button class="btn btn-outline-secondary filter-btn" id="btn-men">Men</button>
        <button class="btn btn-outline-secondary filter-btn" id="btn-women">Women</button>
        <button class="btn btn-outline-secondary filter-btn" id="btn-electronics">Electronics</button>
        <button class="btn btn-outline-secondary filter-btn" id="btn-beauty">Beauty</button>
        <button class="btn btn-outline-secondary filter-btn" id="btn-home">Home</button>
        <button class="btn btn-outline-secondary filter-btn" id="btn-lifestyle">Lifestyle</button>
        <button class="btn btn-outline-secondary filter-btn" id="btn-vehicles">Vehicles</button>
      </div>

      <!-- Spinner -->
      <div id="spinner" class="d-flex justify-content-center d-none">
        <div class="spinner-border" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <!-- Products grid -->
      <div id="resultsContainer" class="row"></div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./JS/main.js"></script>
  </body>
</html>
